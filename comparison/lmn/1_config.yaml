# Test 1 — Fixed execution, GET, 10_000 requests at 20 VUs
# Endpoint is intentionally flaky (~50% 500s), so error_rate threshold is relaxed.

run:
  host: http://localhost:3000/load-test/random-error
  method: get
  output: table
  output_file: comparison/lmn/result/1_run_report.json

execution:
  request_count: 10000
  concurrency: 20

thresholds:
  - metric: error_rate
    operator: lt
    value: 0.7              # endpoint flakes ~50%, allow headroom
  - metric: latency_p95
    operator: lt
    value: 2000.0
  - metric: throughput_rps
    operator: gte
    value: 10.0
