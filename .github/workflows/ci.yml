name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@4305c58e7b2e3de0e6af2e84d61f81b42e1acef5  # stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@4305c58e7b2e3de0e6af2e84d61f81b42e1acef5  # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@9bdcdfd5b299fe7e6da4b4a60d4a4fe31a6d5d7d  # v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@4305c58e7b2e3de0e6af2e84d61f81b42e1acef5  # stable
      - uses: Swatinem/rust-cache@9bdcdfd5b299fe7e6da4b4a60d4a4fe31a6d5d7d  # v2
      - run: cargo test --workspace --locked
