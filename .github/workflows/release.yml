name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  build:
    name: Build ${{ matrix.target }}
    needs: ci
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-13
            use_cross: false
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            use_cross: false
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false
            archive: zip

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.2.2

      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9  # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross
        if: ${{ matrix.use_cross }}
        run: cargo install cross --git https://github.com/cross-rs/cross --tag v0.2.5

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --locked --target ${{ matrix.target }} -p lmn

      - name: Build (cross)
        if: ${{ matrix.use_cross }}
        run: cross build --release --locked --target ${{ matrix.target }} -p lmn

      - name: Package (unix)
        if: ${{ matrix.archive == 'tar.gz' }}
        shell: bash
        run: |
          BINARY=target/${{ matrix.target }}/release/lmn
          ARCHIVE=lmn-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          cp "$BINARY" ./lmn
          tar -czf "$ARCHIVE" lmn LICENSE README.md
          rm lmn
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Package (windows)
        if: ${{ matrix.archive == 'zip' }}
        shell: pwsh
        run: |
          $binary = "target/${{ matrix.target }}/release/lmn.exe"
          $archive = "lmn-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Compress-Archive -Path $binary, LICENSE, README.md -DestinationPath $archive
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Checksums
        run: |
          cd artifacts
          sha256sum lmn-* > checksums.txt

      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2
        with:
          files: |
            artifacts/lmn-*
            artifacts/checksums.txt
          generate_release_notes: true
