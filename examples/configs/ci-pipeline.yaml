# lumen CI pipeline config
# Designed for short, automated quality gates in CI. CLI flags (-H, -R, -C) take
# precedence and can override these values per-run without editing this file.

run:
  host: https://api.example.com
  requests: 500
  concurrency: 50

thresholds:
  - metric: error_rate
    operator: lt
    value: 0.005       # 0.5% error budget — tighter than production alerting
  - metric: latency_p95
    operator: lt
    value: 300.0       # p95 must stay under 300 ms
  - metric: latency_p99
    operator: lt
    value: 800.0       # p99 hard ceiling before the pipeline fails
