site_name: Lumen
site_description: Fast HTTP load testing CLI — dynamic templates, threshold-gated CI, and load curves.
site_url: https://docs.lmn.dev
repo_url: https://github.com/talek-solutions/lmn
repo_name: talek-solutions/lmn
edit_uri: edit/master/docs/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  homepage: /
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - macros

extra:
  version: "0.1.3"

markdown_extensions:
  - pymdownx.snippets:
      base_path: .
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
    - Core Concepts: getting-started/core-concepts.md
  - Guides:
    - Your First Load Test: guides/first-load-test.md
    - Config Files: guides/config-files.md
    - Headers & Authentication: guides/headers-auth.md
    - Dynamic Request Bodies: guides/request-bodies.md
    - Thresholds & CI Gating: guides/thresholds-ci.md
  - Reference:
    - CLI Reference: reference/cli.md
    - Config File Reference: reference/config.md
    - Template Placeholders: reference/template-placeholders.md
    - Exit Codes: reference/exit-codes.md
  - Project:
    - Changelog: project/changelog.md
