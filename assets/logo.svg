<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="LUMEN logo">
    <defs>
        <radialGradient id="bgGlow" cx="50%" cy="45%" r="65%">
            <stop offset="0%" stop-color="#0b1f3b"/>
            <stop offset="45%" stop-color="#08142a"/>
            <stop offset="100%" stop-color="#02060d"/>
        </radialGradient>

        <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#68F7FF"/>
            <stop offset="100%" stop-color="#42DDE8"/>
        </linearGradient>

        <linearGradient id="cyanGradSoft" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#7BFFFF" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="#46DCE8" stop-opacity="0.8"/>
        </linearGradient>

        <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="12" result="blur"/>
            <feColorMatrix
                    in="blur"
                    type="matrix"
                    values="
          0 0 0 0 0.30
          0 0 0 0 0.95
          0 0 0 0 1.00
          0 0 0 0.35 0"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#02111d" flood-opacity="0.6"/>
        </filter>
    </defs>

    <rect width="800" height="800" fill="url(#bgGlow)"/>

    <g filter="url(#softGlow)">
        <g filter="url(#shadow)">
            <path d="M286 392L492 392L470 423L298 423Z" fill="url(#cyanGrad)"/>
            <path d="M318 330L434 300L371 392L286 392Z" fill="url(#cyanGrad)"/>
            <path d="M305 362L330 326L382 312L337 392L300 392Z" fill="url(#cyanGradSoft)" opacity="0.45"/>
        </g>

        <text
                x="400"
                y="510"
                text-anchor="middle"
                fill="url(#cyanGrad)"
                font-size="74"
                letter-spacing="10"
                font-family="Michroma, Orbitron, Arial, sans-serif">
            LUMEN
        </text>
    </g>
</svg>