# lumen CI pipeline config
# Designed for short, automated quality gates in CI. CLI flags (-H, -R, -C) take
# precedence and can override these values per-run without editing this file.

host: https://api.example.com
request_count: 500
concurrency: 50

thresholds:
  - metric: error_rate
    limit: 0.005      # 0.5% error budget — tighter than production alerting
  - metric: p95_ms
    limit: 300.0      # p95 must stay under 300 ms
  - metric: p99_ms
    limit: 800.0      # p99 hard ceiling before the pipeline fails
