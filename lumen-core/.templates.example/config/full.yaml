# lumen full config — all supported fields shown
# CLI flags always take precedence over values in this file.

run:
  host: https://api.example.com
  requests: 1000       # overridden by -R / --request-count
  concurrency: 100     # overridden by -C / --concurrency

# Threshold rules — evaluated after the run completes.
# Exit code 2 is returned when any threshold is not satisfied.
#
# Supported metrics:
#   error_rate      — fraction of failed requests (0.0 – 1.0)
#   latency_min     — minimum latency in milliseconds
#   latency_avg     — mean latency in milliseconds
#   latency_p50     — 50th-percentile latency in milliseconds
#   latency_p75     — 75th-percentile latency in milliseconds
#   latency_p90     — 90th-percentile latency in milliseconds
#   latency_p95     — 95th-percentile latency in milliseconds
#   latency_p99     — 99th-percentile latency in milliseconds
#   latency_max     — maximum latency in milliseconds
#   throughput_rps  — requests per second achieved
#
# Supported operators: lt, lte, gt, gte, eq
thresholds:
  - metric: error_rate
    operator: lt
    value: 0.01        # < 1% errors
  - metric: latency_p50
    operator: lt
    value: 150.0       # p50 under 150 ms
  - metric: latency_p95
    operator: lt
    value: 400.0       # p95 under 400 ms
  - metric: latency_p99
    operator: lt
    value: 1000.0      # p99 hard ceiling 1 s
  - metric: latency_avg
    operator: lt
    value: 200.0       # mean latency ceiling
  - metric: throughput_rps
    operator: gte
    value: 100.0       # service must sustain at least 100 req/s
